name: Mirror gates

# THE GATE THAT KEEPS `docs/audit/RE-AUTHORED-MIRROR-MAP.md` FROM REGROWING.
#
# The map swept 13 subsystems and found 21 instances of one failure mode — a re-authored mirror
# standing in for the real thing, the tests green BECAUSE they test the mirror — and closed with:
#
#   "Fixing 21 and shipping no gate returns this map to its current length within two quarters."
#
# WHY THIS IS A PULL_REQUEST JOB AND NOT A SCHEDULE. There is prior art in this tree for the trap:
# `armed-teeth.yml` is `schedule`-only for a defensible reason (its folds take minutes), and a
# schedule is the honest home for a lane whose cost is real. This gate's cost is NOT real — it is a
# ~20s static scan with no cargo build — so a schedule would buy nothing and cost everything: a new
# mirror would land on main and be reported the next morning, to nobody. A mirror is cheapest to stop
# at write time, which is exactly when a PR check runs.
#
# WHY THE CANARY RUNS FIRST. The map's mechanism (4) is "verification apparatus is exempt from the
# verification standard — nobody audits the auditor, so the auditor drifts furthest." M14 IS that: a
# drift gate whose header states the self-consistency fallacy correctly and whose by-name leg commits
# it. A silent mirror-gate would be the same bug one level up, and it would look exactly like
# success. So CI reintroduces a known mirror per gate and requires each to go RED before it is
# willing to believe any GREEN.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  mirror-gates:
    name: No new re-authored mirrors
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        # No `lfs: true`: the gates read Rust source and the JSON/TSV descriptor artifacts. The
        # LFS-tracked staged TSVs are not parsed for identity (only `.json` carries a `name`), so an
        # LFS pointer stub cannot make this gate lie — it simply has no `name` to collide on.

      - name: Gate the gate, then gate the tree
        run: ./scripts/check-mirror-gates.sh --report

      # The advisory D3 inversion table is a standing worklist, not a verdict, so it is published as a
      # summary rather than a failure. `--report` above already printed it to the log; this puts the
      # count where a reviewer sees it without opening the job.
      - name: Summarise
        if: always()
        run: |
          {
            echo '### Mirror gates'
            echo
            python3 scripts/mirror-gates/mirror_gates.py 2>&1 | head -3
            echo
            echo 'Ratchet: `scripts/mirror-gates/baseline.txt` — known findings from the mirror map.'
            echo 'A NEW mirror fails this job. A FIXED one must leave the baseline, or this job fails'
            echo 'as stale — so the file can only shrink.'
          } >> "$GITHUB_STEP_SUMMARY"

  # ─────────────────────────────────────────────────────────────────────────────
  # WHY A NOTIFIER ON A JOB THAT IS ALREADY A PR CHECK. The header above is right that a PR check is
  # the correct home for this gate — and it is red on `main` anyway. Being visible on a PR is not the
  # same as being REQUIRED on a PR: nothing in this repo's branch protection blocks a merge on this
  # job, so the red was seen, or not seen, and merged either way. It is currently reporting
  # `FAIL G2 DID NOT BARK on G2__oracle_stale/ — the gate is asleep` — i.e. the meta-canary's own
  # verdict is that G2's GREEN carries no information. That is the map's mechanism (4) live: nobody
  # audits the auditor. A red on main needs a durable signal that outlives the PR page.
  #
  # Scoped to `push` (main): on a pull_request event this fires as noise the author already sees on
  # their own checks page, and `gh issue` from a fork PR has no write token anyway.
  page-on-red:
    name: Page a human when the mirror gate is red on main
    needs: [mirror-gates]
    if: ${{ always() && github.event_name == 'push' && needs.mirror-gates.result == 'failure' }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Open or refresh the standing mirror-gate issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          TITLE='mirror-gates: RED on main'
          {
            printf '%s\n\n' "**Mirror gates** failed on \`main\` at \`${SHA}\`: ${RUN_URL}"
            printf '%s\n' 'This job has two distinct failure modes and they need opposite responses — the run'
            printf '%s\n\n' 'log distinguishes them:'
            printf '%s\n' '1. **A gate DID NOT BARK.** The meta-canary reintroduces a known mirror per gate and'
            printf '%s\n' '   requires each to go RED first. `FAIL G<n> DID NOT BARK on G<n>__*/ — the gate is'
            printf '%s\n' '   asleep` means the gate cannot be trusted to bark, **so its GREEN carries no'
            printf '%s\n' '   information**. Fix the gate. Do not delete the canary fixture.'
            printf '%s\n' '2. **A NEW mirror landed**, or `scripts/mirror-gates/baseline.txt` went stale (a fixed'
            printf '%s\n\n' '   finding that never left the baseline). Fix the mirror or shrink the baseline.'
            printf '%s\n' 'Reproduce with `./scripts/check-mirror-gates.sh --report`.'
            printf '%s\n' 'This job is a PR check but is not REQUIRED, so red does not block a merge — which is'
            printf '%s\n' 'why this issue exists rather than a checkmark being enough. The map it defends closes'
            printf '%s\n' 'with: "Fixing 21 and shipping no gate returns this map to its current length within'
            printf '%s\n' 'two quarters." A gate that is red and unread is the same as no gate.'
          } > /tmp/body.md
          EXISTING="$(gh issue list --state open --search "${TITLE} in:title" --json number --jq '.[0].number // empty')"
          if [ -n "${EXISTING}" ]; then
            gh issue comment "${EXISTING}" --body-file /tmp/body.md
            echo "refreshed existing issue #${EXISTING}"
          else
            gh issue create --title "${TITLE}" --body-file /tmp/body.md
          fi
