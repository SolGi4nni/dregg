  <path d="M40 34 L48 48 M88 34 L80 48" stroke="#8fa2c4" stroke-width="3" stroke-linecap="round"/>
  <text x="64" y="120" text-anchor="middle" font-family="monospace" font-size="9" fill="#8fa2c4">example: replace me</text>
