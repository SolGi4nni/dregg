     Palette: the deos-view designed look (deos-view/src/web.rs:1654).
     Replace the guts; keep the viewBox, the transparent background, and the 128x128 box.
     A hand-drawn/AI raster export goes to a sibling .webp/.png at the same 128 (or 256) size. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" role="img"
