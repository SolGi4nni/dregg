# Self-contained Foundry profile for the launchpad FORMAL-VERIFICATION harness.
#
# Deliberately isolated from chain/foundry.toml so this proof harness never races
# the live backstop lane editing chain/contracts/launchpad + chain/test. It
# imports the STABLE core contracts read-only (no .sol edits) via the `contracts/`
# remapping and proves the anti-rug invariants with Halmos (symbolic EVM).
#
# solc 0.8.30: Halmos executes the compiled bytecode, so the solc SMTChecker
# custom-error unsoundness (see README §Tooling) does not apply here.
[profile.default]
src = "test"
test = "test"
out = "out"
libs = []
solc = "0.8.30"
optimizer = true
optimizer_runs = 200
via_ir = true
evm_version = "paris"
allow_paths = ["../contracts", "../lib"]
remappings = [
    "forge-std/=../lib/forge-std/src/",
    "contracts/=../contracts/",
]
