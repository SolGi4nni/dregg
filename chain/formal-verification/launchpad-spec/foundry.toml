# ISOLATED sub-profile for the DreggLaunchpad ESCROW-CONSERVATION spec.
#
# Deliberately in its own directory so the CORE proofs (Token + Pool, one dir up)
# NEVER share a compilation unit with DreggLaunchpad.sol — which the live backstop
# lane is mid-editing (CommitteeAttestor + timeout-refund). A mid-edit ABI change
# here must not break the (green, committed) Token/Pool proofs.
#
# STATUS: SPEC-ONLY. The invariant properties are written; the symbolic PROOF is
# to be RUN/completed AFTER the backstop lane lands (its timeout-refund path IS the
# escrow-conservation surface). Do not race the mid-edit — see ../README.md §Gap.
[profile.default]
src = "test"
test = "test"
out = "out"
libs = []
solc = "0.8.30"
optimizer = true
optimizer_runs = 200
via_ir = true
evm_version = "paris"
allow_paths = ["../../contracts", "../../lib"]
remappings = [
    "forge-std/=../../lib/forge-std/src/",
    "contracts/=../../contracts/",
]
