[Service]
Environment=DREGGNET_WEB_MAX_SESSIONS=200
Environment=DREGGNET_WEB_SESSION_TTL_SECS=1800
Environment=DREGGNET_WEB_OPENS_PER_USER=30
Environment=DREGGNET_WEB_MIN_OPEN_INTERVAL_SECS=1
NoNewPrivileges=true
PrivateTmp=true
ProtectSystem=strict
ReadWritePaths=%h/dregg-games %h/.local/state/dregg-games
InaccessiblePaths=-%h/.config/dregg -%h/.ssh
RestrictAddressFamilies=AF_INET AF_INET6 AF_UNIX
RestrictNamespaces=true
LockPersonality=true
RestrictRealtime=true
RestrictSUIDSGID=true
SystemCallFilter=@system-service
SystemCallErrorNumber=EPERM
