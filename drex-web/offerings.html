<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DreggFi Offerings</title>
<style>
  :root {
    --bg: #0e1116; --panel: #161b22; --panel2: #1c232d; --line: #2a323d;
    --ink: #e6edf3; --dim: #9aa7b4; --accent: #6ee7b7; --accent2: #7dd3fc;
    --warn: #fbbf24; --bad: #f87171; --ok: #34d399;
    --mono: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink);
    font: 15px/1.5 system-ui, -apple-system, Segoe UI, sans-serif; }
  header { padding: 28px 24px 12px; border-bottom: 1px solid var(--line); }
  h1 { margin: 0 0 6px; font-size: 24px; letter-spacing: -0.01em; }
  h1 .fi { color: var(--accent); }
  .scope { color: var(--dim); max-width: 900px; font-size: 13.5px; }
  main { padding: 20px 24px 60px; max-width: 1080px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 14px; }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
    padding: 16px; display: flex; flex-direction: column; gap: 8px; }
  .card h2 { margin: 0; font-size: 16px; }
  .mech { color: var(--accent2); font-family: var(--mono); font-size: 12px; }
  .tier { color: var(--dim); font-size: 12px; }
  .stage { font-size: 11.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em;
    padding: 2px 8px; border-radius: 999px; width: fit-content; }
  .stage.now { color: var(--ok); background: rgba(52,211,153,.12); }
  .stage.spec { color: var(--warn); background: rgba(251,191,36,.12); }
  .stage.linked { color: var(--accent2); background: rgba(125,211,252,.12); }
  .note { color: var(--dim); font-size: 12.5px; }
  .row { display: flex; gap: 8px; margin-top: 4px; flex-wrap: wrap; align-items: center; }
  button, a.btn { font: inherit; font-size: 13px; cursor: pointer; border-radius: 7px;
    padding: 7px 12px; border: 1px solid var(--line); background: var(--panel2);
    color: var(--ink); text-decoration: none; }
  button.run { background: var(--accent); color: #05130d; border-color: var(--accent); font-weight: 600; }
  button.run:disabled { opacity: .5; cursor: default; }
  a.btn:hover, button:hover:not(:disabled) { border-color: var(--accent2); }
  select, input { font: inherit; font-size: 12.5px; background: var(--bg); color: var(--ink);
    border: 1px solid var(--line); border-radius: 6px; padding: 5px 7px; }
  .params { display: none; gap: 6px; flex-wrap: wrap; margin-top: 2px; }
  .params.show { display: flex; }
  .params label { color: var(--dim); font-size: 11.5px; display: flex; flex-direction: column; gap: 2px; }
  .out { margin-top: 8px; background: #0a0d12; border: 1px solid var(--line); border-radius: 8px;
    padding: 0; display: none; overflow: hidden; }
  .out.show { display: block; }
  .out .head { display: flex; justify-content: space-between; align-items: center; gap: 8px;
    padding: 8px 12px; border-bottom: 1px solid var(--line); }
  .verdict { font-weight: 700; font-size: 13px; }
  .verdict.valid { color: var(--ok); } .verdict.invalid { color: var(--bad); }
  .kv { padding: 8px 12px; display: grid; grid-template-columns: auto 1fr; gap: 3px 14px; font-size: 12.5px; }
  .kv .k { color: var(--dim); font-family: var(--mono); }
  .kv .v { font-family: var(--mono); word-break: break-word; }
  .cert { padding: 6px 12px 10px; display: flex; gap: 6px; flex-wrap: wrap; }
  .chip { font-family: var(--mono); font-size: 11px; padding: 2px 7px; border-radius: 999px;
    border: 1px solid var(--line); }
  .chip.pass { color: var(--ok); border-color: rgba(52,211,153,.4); }
  .chip.fail { color: var(--bad); border-color: rgba(248,113,113,.4); }
  pre.raw { margin: 0; padding: 8px 12px; border-top: 1px solid var(--line); font-family: var(--mono);
    font-size: 11px; color: var(--dim); max-height: 220px; overflow: auto; white-space: pre-wrap; }
  details.raw summary { cursor: pointer; padding: 4px 12px; color: var(--dim); font-size: 11.5px; }
  .foot { color: var(--dim); font-size: 12px; margin-top: 26px; max-width: 900px; }
  .foot code { font-family: var(--mono); color: var(--accent2); }
</style>
</head>
<body>
<header>
  <h1>Dregg<span class="fi">Fi</span> Offerings</h1>
  <div class="scope" id="scope">loading…</div>
</header>
<main>
  <div class="grid" id="grid"></div>
  <div class="foot" id="foot"></div>
</main>
<script src="offerings.js"></script>
</body>
</html>
