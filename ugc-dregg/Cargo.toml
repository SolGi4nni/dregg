# `ugc-dregg` — the platform flywheel: a UGC registry + a NO-CHEAT verifiable
# leaderboard, built on the REAL verifiable-game substrate.
#
# Authors PUBLISH universes (a compiled spween world, or a committed procgen seed);
# players SUBMIT completions (a recorded playthrough = the ordered moves + their
# receipt chain + a claimed turns-to-win). The leaderboard accepts a completion ONLY
# if its recorded receipt chain VERIFIES — a stranger re-executes the SAME
# identically-seeded universe with the submitted moves (spween-dregg's
# `verify_by_replay`) and it REACHES THE WIN STATE, and the chain links. So the board
# is trustable-by-CONSTRUCTION, not by honor: a forged/edited/incomplete playthrough
# is REJECTED on replay, and anyone can independently re-verify any entry.
#
# CONSUMES (reimplements nothing; never modifies their src):
#   * spween-dregg    — `WorldCell`/`Driver`/`Playthrough` + `verify`/`verify_by_replay`
#                       (the un-retconnable receipt-chain re-verifier — the no-cheat tooth).
#   * dungeon-on-dregg — the real, winnable dungeon world (its `DUNGEON` scene + win).
#   * procgen-dregg   — the committed verifiable seed pipeline; a publishable/daily
#                       universe is content-addressed by a committed procgen seed and
#                       re-generated byte-for-byte from it.
#
# A breadstuffs workspace member (registered in the root `members`/`default-members`);
# the root `[workspace]`/`[patch]`/`[lints]` apply. No standalone workspace here.
[package]
name = "ugc-dregg"
version = "0.1.0"
edition = "2024"
description = "A UGC universe registry + a no-cheat verifiable leaderboard: a completion is accepted ONLY if its recorded receipt chain re-verifies to a WIN on a stranger's re-execution; forged/incomplete completions are rejected; every entry is independently re-verifiable."

[lints]
workspace = true

[dependencies]
# THE FOUNDATION — the real verifiable-game substrate: `WorldCell::deploy` (a
# deterministic, identically-seeded world), the stock-runtime `Driver` (a playthrough
# is a real `TurnReceipt` chain), and — the load-bearing no-cheat tooth — `verify` /
# `verify_by_replay` / `verify_chain_linkage`: re-drive a FRESH identically-seeded
# world through the submitted moves and require it reproduces the exact committed
# state chain. A forged pick is refused by the real executor on replay. We EXTEND this
# by composition; we never fork its src.
spween-dregg = { path = "../spween-dregg" }
# The real, winnable game world we register as a built-in universe (its `DUNGEON`
# scene + the `gold == 500` win). We CONSUME the scene text + win, never its src.
dungeon-on-dregg = { path = "../dungeon-on-dregg" }
# The committed verifiable-seed pipeline: a daily/publishable universe is
# content-addressed by a committed procgen `CommittedSeed` and re-generated
# byte-for-byte from it through the real `dregg-dice` verified `DrawStream`. We draw a
# playable spween world from procgen's VERIFIED stream (its fairness), never `rand`.
procgen-dregg = { path = "../procgen-dregg" }
# Content-addressing: the universe commitment (its id) and the completion id are
# domain-separated blake3 hashes — the same universe has the same id.
blake3 = "1"
# Verified author identity. An author ATTESTS a published universe with a real
# ed25519 signature over its content commitment; the pubkey is bound into the
# content address, so authorship is attributable + unforgeable (a publish claiming
# another author's key without the signature is refused). This is the SAME
# `ed25519-dalek` the SDK/bot cipherclerk signs with, so the bot's custodial cclerk
# key verifies here verbatim.
ed25519-dalek = { version = "2", features = ["std"] }
